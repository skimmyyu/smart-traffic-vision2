server:
  port: 8080

spring:
  application:
    name: smart-traffic-server
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/traffic_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 520MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

stream:
  rtsp-url: rtsp://127.0.0.1:8554/cam1
  max-frame-width: 960
  reconnect-delay-ms: 400
  # Keep "online" during brief channel-switch stalls (HLS/RTSP settle)
  offline-timeout-ms: 20000

mediamtx:
  config-path: ../mediamtx/mediamtx.yml
  sandbox-host: 10.126.59.120
  sandbox-port: 8554
  hls-base-url: http://127.0.0.1:8888
  webrtc-base-url: http://127.0.0.1:8889
  api-base-url: http://127.0.0.1:9997
  # Phone IP Camera app over Tailscale (see Tailscale app for current 100.x IP)
  ip-camera-host: 100.71.110.18
  ip-camera-port: 8554
  ip-camera-path: live
  ip-camera-mediamtx-path: cam-phone
  # IP 摄像头 App 若开启 RTSP 鉴权，在此填写（VLC 也需带账号密码）
  ip-camera-username: admin
  ip-camera-password: admin

mock:
  inference:
    # Set false when running ai/yolov8 live_bridge.py for real inference
    enabled: false
    interval-ms: 8000

# 道路异常：背景差分检测任意视觉变化（未训练异物）；anomaly.onnx 仅作 debris 回退
anomaly:
  enabled: true
  model-path: ../models/anomaly.onnx
  # Only used to mask people/vehicles from scene-difference detection.
  # Real vehicle/plate recognition still uses the team's sandbox-car-v4 + plate OCR models.
  vehicle-model-path: ../models/vehicle.onnx
  conf-threshold: 0.25
  soft-conf-threshold: 0.20
  vehicle-conf-threshold: 0.25
  iou-threshold: 0.45
  vehicle-suppress-iou: 0.12
  imgsz: 640
  interval-ms: 150
  class-names: debris
  vehicle-class-names: person,bicycle,car,motorcycle,airplane,bus,train,truck,boat,traffic light,fire hydrant,stop sign,parking meter,bench,bird,cat,dog,horse,sheep,cow,elephant,bear,zebra,giraffe,backpack,umbrella,handbag,tie,suitcase,frisbee,skis,snowboard,sports ball,kite,baseball bat,baseball glove,skateboard,surfboard,tennis racket,bottle,wine glass,cup,fork,knife,spoon,bowl,banana,apple,sandwich,orange,broccoli,carrot,hot dog,pizza,donut,cake,chair,couch,potted plant,bed,dining table,toilet,tv,laptop,mouse,remote,keyboard,cell phone,microwave,oven,toaster,sink,refrigerator,book,clock,vase,scissors,teddy bear,hair drier,toothbrush
  alert-cooldown-ms: 8000
  max-boxes: 5
  bg-diff-enabled: true
  bg-learn-seconds: 10
  bg-diff-threshold: 10
  bg-max-fg-ratio: 0.05
  bg-min-area-ratio: 0.03
  bg-max-area-ratio: 0.20
  # 单帧有效变化即确认；不再等待物体持续多帧后才显示
  bg-persist-hits: 1
  bg-only-conf: 0.52
  # 首帧差分即可达显示门槛（配合 min-display-confidence）
  bg-boost: 0.06
  min-display-confidence: 0.50

# 禁停：YOLO 检车 → ByteTrack Java 跟踪 → 禁停区内静止 ≥20s 告警
parking:
  enabled: true
  dwell-threshold-ms: 20000
  still-threshold-px: 18
  alert-cooldown-ms: 60000
  track-high-thresh: 0.5
  track-low-thresh: 0.1
  track-match-thresh: 0.3
  track-buffer: 30

logging:
  level:
    com.traffic: INFO
